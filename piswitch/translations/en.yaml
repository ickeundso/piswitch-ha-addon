configuration:
  mqtt_broker:
    name: MQTT Broker
    description: "MQTT broker URL (e.g., tcp://192.168.1.100:1883)"
  mqtt_username:
    name: MQTT Username
    description: Username for MQTT broker authentication
  mqtt_password:
    name: MQTT Password
    description: Password for MQTT broker authentication
  mqtt_client_id:
    name: MQTT Client ID
    description: Client ID for the MQTT connection (must be unique per broker)
  timeout:
    name: Request Timeout
    description: HTTP request timeout in seconds for frontend API calls

